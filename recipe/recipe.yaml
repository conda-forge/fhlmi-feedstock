schema_version: 1

context:
  name: fhlmi
  version: "0.46.2"
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/fhlmi-${{ version }}.tar.gz
  sha256: 63f029563e2c102548d8f573fd54408cb1c4575b3e4a6a6f89fe2e391bf05cce

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - setuptools-scm >=8
    - pip
  run:
    - aiohttp
    - openai >=2
    - orjson
    - python >=${{ python_min }}
    - coredis >=3.0.1
    - fhaviary >=0.14.0
    - limits >=4.8
    - litellm >=1.83.9,<=1.84.1
    - pydantic >=2.0,<3.dev0,>=2.10.1
    - tiktoken >=0.4.0
tests:
  - python:
      imports:
        - lmi
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: A client to provide LLM responses for FutureHouse applications.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/Future-House/ldp/tree/main/packages/lmi

extra:
  recipe-maintainers:
    - jan-janssen
